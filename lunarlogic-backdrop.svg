<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060e1c;stop-opacity:1" />
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glowLeft" cx="20%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#1a4fd6;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#050d1a;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="35%" r="35%">
      <stop offset="0%" style="stop-color:#6c3fd6;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#050d1a;stop-opacity:0" />
    </radialGradient>

    <!-- Grid line fade -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a6e;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#1e3a6e;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#1e3a6e;stop-opacity:0.05" />
    </linearGradient>

    <!-- DSO line gradient -->
    <linearGradient id="dsoLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="60%" style="stop-color:#3b82f6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:0.5" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <rect width="1920" height="1080" fill="url(#glowLeft)"/>
  <rect width="1920" height="1080" fill="url(#glowRight)"/>

  <!-- Perspective grid floor -->
  <g opacity="0.4">
    <!-- Horizontal grid lines (perspective) -->
    <line x1="0" y1="780" x2="1920" y2="780" stroke="url(#gridFade)" stroke-width="0.8"/>
    <line x1="0" y1="820" x2="1920" y2="820" stroke="url(#gridFade)" stroke-width="0.8"/>
    <line x1="0" y1="860" x2="1920" y2="860" stroke="url(#gridFade)" stroke-width="0.7"/>
    <line x1="0" y1="900" x2="1920" y2="900" stroke="url(#gridFade)" stroke-width="0.6"/>
    <line x1="0" y1="940" x2="1920" y2="940" stroke="url(#gridFade)" stroke-width="0.5"/>
    <line x1="0" y1="980" x2="1920" y2="980" stroke="url(#gridFade)" stroke-width="0.4"/>
    <line x1="0" y1="1020" x2="1920" y2="1020" stroke="url(#gridFade)" stroke-width="0.3"/>
    <line x1="0" y1="1060" x2="1920" y2="1060" stroke="url(#gridFade)" stroke-width="0.2"/>

    <!-- Vertical grid lines (converging to vanishing point at center) -->
    <line x1="960" y1="720" x2="0" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="192" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="384" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="576" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="768" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="960" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="1152" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="1344" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="1536" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="1728" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
    <line x1="960" y1="720" x2="1920" y2="1080" stroke="#1e3a6e" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- DSO trend line chart (right side, subtle) -->
  <g opacity="0.55" transform="translate(1050, 200)">
    <!-- Chart area -->
    <rect x="0" y="0" width="700" height="320" fill="#0d1f3c" rx="12" opacity="0.5"/>

    <!-- Chart label -->
    <text x="20" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a7fd4" letter-spacing="2" opacity="0.8">DSO TREND — 90 DAY ROLLING</text>

    <!-- Y-axis grid lines -->
    <line x1="60" y1="50" x2="680" y2="50" stroke="#1e3a6e" stroke-width="0.8" opacity="0.6"/>
    <line x1="60" y1="110" x2="680" y2="110" stroke="#1e3a6e" stroke-width="0.8" opacity="0.6"/>
    <line x1="60" y1="170" x2="680" y2="170" stroke="#1e3a6e" stroke-width="0.8" opacity="0.6"/>
    <line x1="60" y1="230" x2="680" y2="230" stroke="#1e3a6e" stroke-width="0.8" opacity="0.6"/>
    <line x1="60" y1="290" x2="680" y2="290" stroke="#1e3a6e" stroke-width="0.8" opacity="0.6"/>

    <!-- Y-axis labels -->
    <text x="50" y="54" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#3b5a8a" text-anchor="end">55</text>
    <text x="50" y="114" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#3b5a8a" text-anchor="end">48</text>
    <text x="50" y="174" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#3b5a8a" text-anchor="end">41</text>
    <text x="50" y="234" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#3b5a8a" text-anchor="end">34</text>
    <text x="50" y="294" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#3b5a8a" text-anchor="end">27</text>

    <!-- DSO line — declining after go-live marker -->
    <polyline
      points="60,60 110,65 160,70 210,80 260,90 310,95 355,100 355,100 400,185 450,210 500,235 550,245 600,258 650,265 680,268"
      fill="none" stroke="url(#dsoLine)" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Area fill under line -->
    <polygon
      points="60,60 110,65 160,70 210,80 260,90 310,95 355,100 400,185 450,210 500,235 550,245 600,258 650,265 680,268 680,290 60,290"
      fill="#3b82f6" opacity="0.07"/>

    <!-- Go-live vertical marker -->
    <line x1="355" y1="45" x2="355" y2="290" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.8"/>
    <rect x="330" y="38" width="90" height="16" rx="3" fill="#1a2d50" opacity="0.9"/>
    <text x="375" y="49" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" letter-spacing="0.5">▼ GO-LIVE</text>

    <!-- Current DSO callout -->
    <circle cx="680" cy="268" r="5" fill="#60efff" filter="url(#glow)"/>
    <rect x="620" y="248" width="55" height="18" rx="3" fill="#0d2a4a" opacity="0.95"/>
    <text x="647" y="261" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#60efff" text-anchor="middle" font-weight="600">28 days</text>
  </g>

  <!-- AR Aging bars (left side, subtle) -->
  <g opacity="0.45" transform="translate(170, 230)">
    <rect x="0" y="0" width="480" height="300" fill="#0d1f3c" rx="12" opacity="0.5"/>
    <text x="20" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a7fd4" letter-spacing="2" opacity="0.8">AR AGING WATERFALL</text>

    <!-- Bars -->
    <rect x="40" y="60" width="70" height="180" rx="4" fill="#3b82f6" opacity="0.85"/>
    <rect x="145" y="100" width="70" height="140" rx="4" fill="#6366f1" opacity="0.75"/>
    <rect x="250" y="150" width="70" height="90" rx="4" fill="#8b5cf6" opacity="0.65"/>
    <rect x="355" y="195" width="70" height="45" rx="4" fill="#ec4899" opacity="0.55"/>

    <!-- Bar labels -->
    <text x="75" y="258" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#93b4d8" text-anchor="middle">Current</text>
    <text x="180" y="258" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#93b4d8" text-anchor="middle">1–30</text>
    <text x="285" y="258" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#93b4d8" text-anchor="middle">31–60</text>
    <text x="390" y="258" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#93b4d8" text-anchor="middle">61–90</text>

    <!-- Value labels on bars -->
    <text x="75" y="53" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="600">$48.2K</text>
    <text x="180" y="93" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle" font-weight="600">$31.7K</text>
    <text x="285" y="143" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle" font-weight="600">$12.4K</text>
    <text x="390" y="188" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#f9a8d4" text-anchor="middle" font-weight="600">$4.1K</text>
  </g>

  <!-- Floating data chips -->
  <g filter="url(#glow)">
    <!-- DSO metric chip -->
    <rect x="760" y="820" width="200" height="64" rx="10" fill="#0d1f3c" stroke="#1e3a6e" stroke-width="1" opacity="0.85"/>
    <text x="860" y="848" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#4a7fd4" text-anchor="middle" letter-spacing="2">AVG DSO</text>
    <text x="860" y="874" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" fill="#60efff" text-anchor="middle" font-weight="700">28 days</text>

    <!-- Collection rate chip -->
    <rect x="980" y="820" width="200" height="64" rx="10" fill="#0d1f3c" stroke="#1e3a6e" stroke-width="1" opacity="0.85"/>
    <text x="1080" y="848" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#4a7fd4" text-anchor="middle" letter-spacing="2">COLLECTED</text>
    <text x="1080" y="874" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" fill="#34d399" text-anchor="middle" font-weight="700">$96.4K</text>
  </g>

  <!-- Thin horizontal rule above logo area -->
  <line x1="80" y1="960" x2="1840" y2="960" stroke="#1e3a6e" stroke-width="0.8" opacity="0.5"/>

  <!-- ── LOGO AREA ── -->
  <!-- Moon icon -->
  <g transform="translate(80, 978)" filter="url(#softGlow)">
    <!-- Crescent moon -->
    <circle cx="26" cy="22" r="18" fill="#1a4fd6" opacity="0.15"/>
    <circle cx="26" cy="22" r="18" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
    <!-- Crescent cutout effect via overlapping filled circle -->
    <circle cx="33" cy="16" r="14" fill="#050d1a"/>
    <!-- Star accents -->
    <circle cx="52" cy="12" r="1.5" fill="#60efff" opacity="0.9"/>
    <circle cx="58" cy="22" r="1" fill="#60efff" opacity="0.6"/>
    <circle cx="48" cy="28" r="1" fill="#93c5fd" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="1005"
    font-family="'Segoe UI', 'Inter', system-ui, sans-serif"
    font-size="26"
    font-weight="300"
    letter-spacing="6"
    fill="#e2e8f0"
    filter="url(#textGlow)"
    opacity="0.95">LUNAR<tspan font-weight="700" fill="#60efff">LOGIC</tspan>
  </text>

  <!-- Tagline -->
  <text x="122" y="1025"
    font-family="'Segoe UI', 'Inter', system-ui, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="3.5"
    fill="#4a7fd4"
    opacity="0.8">AR AUTOMATION  ·  ORDER-TO-CASH</text>

  <!-- Website / contact (right aligned) -->
  <text x="1840" y="1005"
    font-family="'Segoe UI', 'Inter', system-ui, sans-serif"
    font-size="13"
    fill="#4a7fd4"
    text-anchor="end"
    letter-spacing="1"
    opacity="0.7">lunarlogic.ai</text>
  <text x="1840" y="1022"
    font-family="'Segoe UI', 'Inter', system-ui, sans-serif"
    font-size="11"
    fill="#2d4a7a"
    text-anchor="end"
    letter-spacing="1"
    opacity="0.6">jrodriguez@lunarlogic.ai</text>

  <!-- Subtle star field -->
  <g opacity="0.4">
    <circle cx="120" cy="150" r="1" fill="white" opacity="0.6"/>
    <circle cx="340" cy="80" r="1.5" fill="white" opacity="0.4"/>
    <circle cx="680" cy="190" r="1" fill="white" opacity="0.5"/>
    <circle cx="820" cy="60" r="1" fill="#93c5fd" opacity="0.6"/>
    <circle cx="950" cy="130" r="1.5" fill="white" opacity="0.3"/>
    <circle cx="1200" cy="95" r="1" fill="white" opacity="0.5"/>
    <circle cx="1380" cy="170" r="1" fill="#60efff" opacity="0.4"/>
    <circle cx="1560" cy="50" r="1.5" fill="white" opacity="0.3"/>
    <circle cx="1720" cy="140" r="1" fill="white" opacity="0.5"/>
    <circle cx="1850" cy="80" r="1" fill="#93c5fd" opacity="0.4"/>
    <circle cx="200" cy="480" r="1" fill="white" opacity="0.25"/>
    <circle cx="900" cy="420" r="1" fill="white" opacity="0.2"/>
    <circle cx="1650" cy="520" r="1" fill="white" opacity="0.25"/>
  </g>
</svg>
